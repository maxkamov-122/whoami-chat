<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOAMI SEC | C2 Node</title>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Shifrlash kutubxonasi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        :root { --neon: #00ff41; --super: #ff003c; --sub: #00d4ff; }
        * { box-sizing: border-box; cursor: crosshair; transition: 0.3s; }
        
        body { 
            background: radial-gradient(circle, #0f0f0f 0%, #000 100%);
            color: var(--neon); font-family: 'Courier New', monospace;
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 65, 0.2); border-radius: 12px;
            width: 95%; max-width: 500px; height: 90vh; display: flex; flex-direction: column; padding: 25px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.1); position: relative;
        }

        /* ADMIN NEON EFFEKTI (SENIKI) */
        @keyframes admin-blink { 0%, 100% { text-shadow: 0 0 20px var(--super); color: var(--super); } 50% { opacity: 0.5; } }
        .super-glow { animation: admin-blink 1s infinite !important; font-weight: bold; }

        h2 { text-align: center; letter-spacing: 8px; text-shadow: 0 0 10px var(--neon); margin: 0 0 20px 0; }
        input, button { background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin: 8px 0; border-radius: 8px; outline: none; width: 100%; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); cursor: pointer; }
        
        #chat-container { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; scroll-behavior: smooth; }
        .msg { margin: 12px 0; font-size: 0.85em; border-left: 1px solid rgba(0, 255, 65, 0.3); padding-left: 10px; }
        
        /* ADMIN PANEL (SENIKI) */
        #admin-panel { 
            display: none; position: absolute; top: 15%; left: 50%; transform: translateX(-50%); 
            background: #050505; border: 1px solid var(--super); padding: 20px; 
            border-radius: 12px; z-index: 100; width: 280px; box-shadow: 0 0 30px var(--super); 
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <!-- LOGIN QISMI -->
    <div id="login-scr" style="display: flex; flex-direction: column; justify-content: center; height: 100%;">
        <h2>[ WHOAMI SEC ]</h2>
        <div style="display:flex; justify-content:center; gap:15px; font-size:2em; margin-bottom:15px;">
            <span onclick="setAv('👤', this)" style="cursor:pointer">👤</span>
            <span onclick="setAv('🤖', this)" style="cursor:pointer">🤖</span>
            <span onclick="setAv('🕶️', this)" style="cursor:pointer">🕶️</span>
        </div>
        <input type="text" id="nick-in" placeholder="NIK..." oninput="checkAdmin(this.value)">
        <div id="pass-box" style="display:none;"><input type="password" id="pass-in" placeholder="PAROL..."></div>
        <button onclick="launch()">TIZIMNI YUKLASH</button>
    </div>

    <!-- CHAT QISMI -->
    <div id="chat-scr" style="display:none; flex-direction: column; height: 100%;">
        <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.7em;">
            <span>🟢 SECURE_PHP_LINK: ACTIVE</span>
            <button id="adm-btn" style="display:none; width:auto; padding:2px 10px;" onclick="toggleAdm()">[CMD]</button>
        </div>
        <div id="chat-container"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="msg-in" style="flex-grow:1" placeholder="Xabar...">
            <button onclick="pushMsg()" style="width:50px">></button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel">
        <h4 class="super-glow" style="text-align:center">ROOT CONTROL</h4>
        <button onclick="clearChat()" style="width:100%">Chatni Tozalash</button>
        <button onclick="toggleAdm()" style="width:100%; margin-top:10px;">Yopish</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let activeAv = "👤", myRole = "user";
    const masterKey = "XGAB_INTERNAL_2026"; // Shifrlash kaliti

    function setAv(av, el) { activeAv = av; }
    function checkAdmin(v) { document.getElementById('pass-box').style.display = (v === "x-gab") ? "block" : "none"; }

    function launch() {
        const n = document.getElementById('nick-in').value, p = document.getElementById('pass-in').value;
        if(!n) return;
        if(n === "x-gab" && p === "2011") { myRole = "super"; activeAv = "👑"; document.getElementById('adm-btn').style.display = "block"; }
        
        document.getElementById('login-scr').style.display = "none";
        document.getElementById('chat-scr').style.display = "flex";
        printMsg("SYSTEM", "Kanal shifrlangan. Barcha xabarlar botga yuboriladi.");
    }

    function pushMsg() {
        const i = document.getElementById('msg-in'), n = document.getElementById('nick-in').value;
        if(i.value.trim() !== "") {
            // Xabarni AES bilan shifrlash
            const enc = CryptoJS.AES.encrypt(i.value, masterKey).toString();
            
            // Xabarni botga yuborish
            const payload = JSON.stringify({ u: n, t: enc, a: activeAv, r: myRole });
            tg.sendData(payload);
            
            printMsg(n, i.value, activeAv);
            i.value = "";
        }
    }

    function printMsg(u, t, av) {
        const c = document.getElementById('chat-container');
        const d = document.createElement('div');
        d.className = 'msg';
        let cls = (u === "x-gab") ? "super-glow" : "";
        let name = (u === "x-gab") ? "ADMIN " + u : u;
        let icon = (u === "x-gab") ? "👑" : av;
        d.innerHTML = `<span>${icon}</span> <div><b class="${cls}">${name}:</b><br><span>${t}</span></div>`;
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }

    function toggleAdm() { document.getElementById('admin-panel').style.display = (document.getElementById('admin-panel').style.display === "block") ? "none" : "block"; }
    function clearChat() { document.getElementById('chat-container').innerHTML = ""; toggleAdm(); }
    document.getElementById('msg-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') pushMsg(); });
</script>
</body>
</html>
