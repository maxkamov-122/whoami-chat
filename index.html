<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOAMI SEC | C2 Yashirin Node</title>
    <!-- KIBER KUTUBXONALAR -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        :root { 
            --neon: #00ff41; 
            --super: #ff003c; 
            --sub: #00d4ff; 
            --bg-grad: radial-gradient(circle, #0f0f0f 0%, #000 100%);
        }
        * { box-sizing: border-box; cursor: crosshair; transition: 0.3s; }
        
        body { 
            background: var(--bg-grad);
            color: var(--neon); font-family: 'Courier New', monospace;
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Hackercha Scanline Animatsiyasi */
        body::before {
            content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 65, 0.2); border-radius: 12px;
            width: 95%; max-width: 550px; height: 90vh;
            display: flex; flex-direction: column; padding: 25px;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.15); position: relative; z-index: 20;
        }

        /* Admin va Neon Effektlar */
        @keyframes admin-blink { 0%, 100% { text-shadow: 0 0 20px var(--super); color: var(--super); } 50% { opacity: 0.3; } }
        .super-glow { animation: admin-blink 1s infinite !important; font-weight: bold; }
        
        @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 { text-align: center; letter-spacing: 10px; text-shadow: 0 0 15px var(--neon); margin: 0 0 20px 0; }
        
        input, button { 
            background: rgba(0, 0, 0, 0.8); border: 1px solid var(--neon); 
            color: var(--neon); padding: 12px; margin: 8px 0; border-radius: 8px; outline: none; width: 100%;
        }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 25px var(--neon); cursor: pointer; font-weight: bold; }

        #chat-container { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; scroll-behavior: smooth; }
        .msg { margin: 15px 0; font-size: 0.9em; border-left: 2px solid var(--neon); padding-left: 12px; animation: slide-up 0.4s ease-out; }

        /* Yuqori Panel */
        .info-bar { display: flex; justify-content: space-between; font-size: 0.7em; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        /* Modal Panellar */
        #admin-panel, #member-list { 
            display: none; position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            background: #080808; border: 2px solid var(--super); padding: 25px;
            border-radius: 12px; z-index: 100; width: 320px; box-shadow: 0 0 40px var(--super);
        }

        .color-opt { display: inline-block; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; margin: 8px; border: 1px solid #fff; }
        .user-node { color: var(--sub); margin: 5px 0; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="glass-panel">
    <!-- KIRISH EKRANI -->
    <div id="login-scr" style="display: flex; flex-direction: column; justify-content: center; height: 100%;">
        <h2>[ WHOAMI SEC ]</h2>
        <div style="display:flex; justify-content:center; gap:20px; font-size:2.5em; margin-bottom:25px;">
            <span class="av-opt" onclick="tanlaAv('👤', this)" style="cursor:pointer">👤</span>
            <span class="av-opt" onclick="tanlaAv('🤖', this)" style="cursor:pointer">🤖</span>
            <span class="av-opt" onclick="tanlaAv('🕶️', this)" style="cursor:pointer">🕶️</span>
        </div>
        <input type="text" id="nick-in" placeholder="IDENTIFIKATOR (NIK)..." oninput="adminTekshir(this.value)">
        <div id="pass-box" style="display:none;"><input type="password" id="pass-in" placeholder="XAVFSIZLIK KALITI ..."></div>
        <button onclick="yuklaTizimni()">TIZIMNI YUKLASH</button>
    </div>

    <!-- CHAT EKRANI -->
    <div id="chat-scr" style="display:none; flex-direction: column; height: 100%;">
        <div class="info-bar">
            <span>🟢 HOLAT: SHIFRLANGAN</span>
            <span onclick="toggleAzzolar()" style="cursor:pointer">👥 NODELAR: <b id="user-count">1</b></span>
            <button id="adm-btn" style="display:none; width:auto; padding:2px 10px; border-color:var(--super); color:var(--super)" onclick="toggleAdmin()">[CMD_PANEL]</button>
        </div>
        <div id="chat-container"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="msg-in" style="flex-grow:1" placeholder="Maxfiy xabar yozing...">
            <button onclick="yubor()" style="width:60px">></button>
        </div>
    </div>

    <!-- ADMIN BOSHQARUVI -->
    <div id="admin-panel">
        <h4 class="super-glow" style="text-align:center; margin-top:0;">[ ROOT BOSHQARUV ]</h4>
        <p style="font-size:0.75em; text-align:center;">DIZAYN FONINI O'ZGARTIRISH:</p>
        <div style="text-align:center;">
            <div class="color-opt" style="background: radial-gradient(circle, #0f0f0f 0%, #000 100%);" onclick="fonOzgar('radial-gradient(circle, #0f0f0f 0%, #000 100%)')"></div>
            <div class="color-opt" style="background: radial-gradient(circle, #250000 0%, #000 100%);" onclick="fonOzgar('radial-gradient(circle, #250000 0%, #000 100%)')"></div>
            <div class="color-opt" style="background: radial-gradient(circle, #001f25 0%, #000 100%);" onclick="fonOzgar('radial-gradient(circle, #001f25 0%, #000 100%)')"></div>
        </div>
        <hr style="border:0.5px solid #333; margin:15px 0;">
        <button onclick="tozalaChat()" style="border-color:var(--super);">CHATNI TOZALASH</button>
        <button onclick="toggleAdmin()" style="border-color:#555; margin-top:10px;">ORQAGA</button>
    </div>

    <!-- ONLINE NODELAR -->
    <div id="member-list">
        <h4 style="text-align:center; margin-top:0; color:var(--neon);">FAOLLIKDAGI NODELAR</h4>
        <div id="nodes-box" style="max-height: 200px; overflow-y: auto;"></div>
        <button onclick="toggleAzzolar()" style="border-color:#555; margin-top:15px;">YOPISH</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let faolAvatar = "👤";
    let meningRolim = "foydalanuvchi";
    let maxfiyKalit = "XGAB_INTERNAL_CRYPTO_2026";
    let onlineNodelar = ["Bot_System"];

    function tanlaAv(av, el) {
        faolAvatar = av;
        document.querySelectorAll('.av-opt').forEach(a => a.style.textShadow = "none");
        el.style.textShadow = "0 0 25px var(--neon)";
    }

    function adminTekshir(v) {
        document.getElementById('pass-box').style.display = (v.toLowerCase() === "x-gab") ? "block" : "none";
    }

    function yuklaTizimni() {
        const n = document.getElementById('nick-in').value;
        const p = document.getElementById('pass-in').value;
        if(!n) { alert("Nikingizni kiriting!"); return; }

        if(n.toLowerCase() === "x-gab") {
            if(p === "2011") {
                meningRolim = "super"; faolAvatar = "👑";
                document.getElementById('adm-btn').style.display = "block";
            } else {
                alert("KALIT XATO!"); return;
            }
        }
        
        onlineNodelar.push(n);
        yangilaUI();
        
        document.getElementById('login-scr').style.display = "none";
        document.getElementById('chat-scr').style.display = "flex";
        chiqarXabar("SYSTEM", "Xavfsiz tunnel o'rnatildi. Xush kelibsiz, " + n);
    }

    function yubor() {
        const i = document.getElementById('msg-in'), n = document.getElementById('nick-in').value;
        if(i.value.trim() !== "") {
            // E2EE Shifrlash
            const cipherText = CryptoJS.AES.encrypt(i.value, maxfiyKalit).toString();
            // Botga shifrlangan ma'lumotni yuborish
            tg.sendData(JSON.stringify({u: n, t: cipherText, a: faolAvatar, r: meningRolim}));
            
            chiqarXabar(n, i.value, faolAvatar);
            i.value = "";
        }
    }

    function chiqarXabar(u, t, av) {
        const c = document.getElementById('chat-container');
        const d = document.createElement('div');
        d.className = 'msg';
        let cls = (u.toLowerCase() === "x-gab") ? "super-glow" : "";
        d.innerHTML = `<span>${av}</span> <div><b class="${cls}">${u.toLowerCase() === "x-gab" ? "ADMIN " + u : u}:</b><br><span>${t}</span></div>`;
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }

    // Admin Panel Funksiyalari
    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = (p.style.display === "block") ? "none" : "block";
    }

    function fonOzgar(rang) {
        document.body.style.background = rang;
    }

    function tozalaChat() {
        document.getElementById('chat-container').innerHTML = "";
        chiqarXabar("SYSTEM", "Chat admin tomonidan tozalandi.");
        toggleAdmin();
    }

    // A'zolar Ro'yxati Funksiyalari
    function toggleAzzolar() {
        const p = document.getElementById('member-list');
        p.style.display = (p.style.display === "block") ? "none" : "block";
        const box = document.getElementById('nodes-box');
        box.innerHTML = onlineNodelar.map(u => `<div class="user-node">> ${u}</div>`).join("");
    }

    function yangilaUI() {
        document.getElementById('user-count').innerText = onlineNodelar.length;
    }

    document.getElementById('msg-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') yubor(); });
</script>
</body>
</html>
