<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOAMI SEC | C2 Hidden Node</title>
    <!-- KUTUBXONALAR -->
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        :root { 
            --neon: #00ff41; --super: #ff003c; --sub: #00d4ff; 
            --bg: radial-gradient(circle, #0f0f0f 0%, #000 100%);
        }
        * { box-sizing: border-box; cursor: crosshair; transition: 0.3s; }
        
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; height: 100vh; margin: 0; 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* SCANLINE EFFEKTI */
        body::after { 
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: repeating-linear-gradient(0deg, rgba(0,255,65,0.03) 0px, rgba(0,255,65,0.03) 1px, transparent 1px, transparent 2px); 
            pointer-events: none; z-index: 50; 
        }
        
        .glass-panel {
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 65, 0.2); border-radius: 12px;
            width: 95%; max-width: 500px; height: 90vh; display: flex; flex-direction: column; padding: 25px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.1); position: relative; z-index: 100;
        }

        /* NEON ANIMATSIYALAR */
        @keyframes admin-blink { 0%, 100% { text-shadow: 0 0 20px var(--super); color: var(--super); } 50% { opacity: 0.4; } }
        @keyframes helper-blink { 0%, 100% { text-shadow: 0 0 20px var(--sub); color: var(--sub); } 50% { opacity: 0.4; } }
        
        .super-glow { animation: admin-blink 1s infinite !important; font-weight: bold; }
        .helper-glow { animation: helper-blink 1s infinite !important; font-weight: bold; }

        h2 { text-align: center; letter-spacing: 8px; text-shadow: 0 0 10px var(--neon); margin: 0 0 15px 0; }
        
        input, button { 
            background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon); 
            color: var(--neon); padding: 12px; margin: 8px 0; border-radius: 8px; outline: none; width: 100%;
        }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        #chat-container { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; scroll-behavior: smooth; padding-right: 5px; }
        .msg { margin: 12px 0; font-size: 0.85em; border-left: 1px solid var(--neon); padding-left: 10px; animation: slideIn 0.3s forwards; }
        .sys-msg { font-size: 0.7em; color: #555; text-align: center; margin: 5px 0; }
        @keyframes slideIn { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ADMIN PANEL */
        #admin-panel { 
            display: none; position: absolute; top: 15%; left: 50%; transform: translateX(-50%); 
            background: #050505; border: 1px solid var(--super); padding: 20px; 
            z-index: 200; width: 280px; box-shadow: 0 0 30px var(--super); border-radius: 12px; 
        }

        .av-box { display: flex; justify-content: center; gap: 15px; font-size: 2em; margin-bottom: 15px; }
        .av-opt { cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .av-opt.active { opacity: 1; transform: scale(1.3); text-shadow: 0 0 15px var(--neon); }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.65em; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 10px; }
        
        /* OVERLAYLAR */
        #panic-overlay, #ban-overlay { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #600; color: #fff; z-index: 1000; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; font-weight: bold;
        }

        .file-btn { width: 45px !important; padding: 0 !important; font-size: 1.2em; margin-right: 5px; }
        img.chat-img { max-width: 200px; border: 1px solid var(--neon); border-radius: 8px; margin-top: 5px; cursor: zoom-in; }
    </style>
</head>
<body>

<!-- BLOKLASH VA XAVF EKRANLARI -->
<div id="panic-overlay"><h1>⚠️ XAVF ⚠️</h1><p>CHAT HAVF OSTIDA! TEZDA CHIQING!</p></div>
<div id="ban-overlay"><h1>🚫 BLOKLANGAN 🚫</h1><p>BU QURILMA ADMIN TOMONIDAN BLOKLANGAN!</p></div>

<div class="glass-panel">
    <!-- LOGIN SCREEN -->
    <div id="login-scr" style="display: flex; flex-direction: column; justify-content: center; height: 100%;">
        <h2>[ WHOAMI SEC ]</h2>
        <div class="av-box">
            <span class="av-opt active" onclick="setAv('👤', this)">👤</span>
            <span class="av-opt" onclick="setAv('🤖', this)">🤖</span>
            <span class="av-opt" onclick="setAv('🕶️', this)">🕶️</span>
            <span class="av-opt" onclick="setAv('👽', this)">👽</span>
        </div>
        <input type="text" id="nick-in" placeholder="IDENTIFIKATOR (NIK)..." oninput="checkAdm(this.value)">
        <div id="pass-box" style="display:none;"><input type="password" id="pass-in" placeholder="MAXFIY KALIT..." style="border-color: var(--super);"></div>
        <button onclick="launch()">TIZIMNI YUKLASH</button>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-scr" style="display:none; flex-direction: column; height: 100%;">
        <div class="status-bar">
            <span>🟢 ONLAYN: <b id="online-count">0</b></span>
            <span>SHIFRLASH: AES-256</span>
            <button id="adm-btn" style="display:none; width:auto; padding:2px 8px; border-color: var(--super); color: var(--super);" onclick="toggleAdm()">[CMD]</button>
        </div>
        <div id="chat-container"></div>
        <div style="display:flex; gap:5px; align-items: center;">
            <button class="file-btn" onclick="document.getElementById('file-in').click()">📁</button>
            <input type="file" id="file-in" style="display:none" accept="image/*" onchange="sendFile(this)">
            <input type="text" id="msg-in" style="flex-grow:1" placeholder="Maxfiy xabar...">
            <button onclick="send()" style="width:50px">></button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel">
        <h4 id="adm-title" class="super-glow" style="text-align:center; margin-top:0;">ROOT_CONTROL</h4>
        <button onclick="sendAction('clear')" style="border-color: var(--super)">LOGLARNI TOZALASH</button>
        
        <div id="root-controls">
            <button onclick="sendAction('panic')" style="background: var(--super); color:white; border:none; margin-top:10px;">🚨 TREVOGA</button>
            <button onclick="sendAction('lock')" id="lock-status-btn" style="border-color: var(--sub)">🔒 CHATNI YOPISH</button>
            <p style="font-size: 0.7em; margin: 15px 0 5px;">FONNI O'ZGARTIRISH:</p>
            <div style="display:flex; gap:5px;">
                <button onclick="sendAction('bg-0')" style="font-size: 8px;">QORA</button>
                <button onclick="sendAction('bg-1')" style="font-size: 8px;">QIZIL</button>
                <button onclick="sendAction('bg-2')" style="font-size: 8px;">KO'K</button>
            </div>
            <button onclick="localStorage.removeItem('chat_ban'); alert('Barcha banlar yechildi!')" style="margin-top:15px; font-size: 9px; opacity: 0.5;">BANLARNI TOZALASH</button>
        </div>
        
        <button onclick="toggleAdm()" style="margin-top:10px; border-color:#555">BACK</button>
    </div>
</div>

<script>
    // QURILMA BANINI TEKSHIRISH
    if(localStorage.getItem('chat_ban')) {
        document.getElementById('ban-overlay').style.display = "flex";
    }

    const ABLY_KEY = '7k7eJQ.wlzQCA:mT1OA_HGf29bZrs8s_kMJ2K39lR6UgNr1aOGks7ttds';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('whoami-v5-final');

    let activeAv = "👤", myRole = "user", myNick = "", mKey = "WHOAMI_XGAB_2026_SECURE_NODE", isChatLocked = false;

    function setAv(av, el) { activeAv = av; document.querySelectorAll('.av-opt').forEach(x => x.classList.remove('active')); el.classList.add('active'); }
    
    function checkAdm(v) { 
        const l = v.toLowerCase();
        document.getElementById('pass-box').style.display = (l === "x-gab" || l === "helper") ? "block" : "none"; 
    }

    async function launch() {
        const n = document.getElementById('nick-in').value, p = document.getElementById('pass-in').value;
        if(!n) return;
        myNick = n;

        if(n.toLowerCase() === "x-gab" && p === "2011") { 
            myRole = "super"; activeAv = "👑"; document.getElementById('adm-btn').style.display = "block";
        } else if(n.toLowerCase() === "helper" && p === "2024") {
            myRole = "helper"; activeAv = "🛡️"; document.getElementById('adm-btn').style.display = "block";
            document.getElementById('adm-title').className = "helper-glow"; document.getElementById('adm-title').innerText = "HELPER_CONTROL";
            document.getElementById('root-controls').style.display = "none";
        }
        
        document.getElementById('login-scr').style.display = "none";
        document.getElementById('chat-scr').style.display = "flex";
        
        if(myRole !== "super") {
            channel.publish('status', { msg: `${n} chatga kirdi...` });
        }

        channel.subscribe('msg', (m) => {
            try {
                const dec = CryptoJS.AES.decrypt(m.data.content, mKey).toString(CryptoJS.enc.Utf8);
                if(dec) printMsg(m.data.sender, dec, m.data.avatar, m.data.role, m.data.isImg);
            } catch(e) {}
        });

        channel.subscribe('status', (m) => {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'sys-msg';
            div.innerText = m.data.msg;
            container.appendChild(div);
        });

        channel.subscribe('system', (m) => {
            if(m.data.type === 'clear') document.getElementById('chat-container').innerHTML = "";
            if(m.data.type === 'panic') document.getElementById('panic-overlay').style.display = "flex";
            if(m.data.type === 'lock') { isChatLocked = m.data.state; if(isChatLocked) alert("Chat yopildi!"); }
            if(m.data.type === 'ban' && m.data.target === myNick) { localStorage.setItem('chat_ban', 'true'); location.reload(); }
            if(m.data.type.startsWith('bg-')) {
                const colors = ['#000', 'radial-gradient(circle, #200000 0%, #000 100%)', 'radial-gradient(circle, #001a20 0%, #000 100%)'];
                document.body.style.background = colors[m.data.type.split('-')[1]];
            }
        });

        channel.presence.subscribe('enter', updateOnline);
        channel.presence.subscribe('leave', updateOnline);
        await channel.presence.enter({ u: n });
    }

    function updateOnline() {
        channel.presence.get((err, members) => {
            document.getElementById('online-count').innerText = members ? members.length : 0;
        });
    }

    function printMsg(user, text, av, role, isImg) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = 'msg';
        let glow = "", tag = "";
        if(role === 'super') { glow = "class='super-glow'"; tag = "<span class='super-glow'>[ADMIN]</span> "; }
        if(role === 'helper') { glow = "class='helper-glow'"; tag = "<span class='helper-glow'>[HELPER]</span> "; }
        
        let content = isImg ? `<br><img src="${text}" class="chat-img" onclick="window.open(this.src)">` : `<span>${text}</span>`;
        
        div.innerHTML = `<span>${av}</span> ${tag}<b ${glow} onclick="banPrompt('${user}')">${user}:</b> ${content}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        
        setTimeout(() => { div.style.opacity = "0"; setTimeout(() => div.remove(), 1000); }, 300000);
    }

    function banPrompt(target) {
        if(myRole === 'super' && target !== myNick) {
            if(confirm(target + "ni BAN qilishni xohlaysizmi?")) {
                channel.publish('system', { type: 'ban', target: target });
            }
        }
    }

    async function send() {
        if(isChatLocked && myRole === 'user') return alert("CHAT ADMIN TOMONIDAN VAQTINCHALIK YOPILGAN!");
        const input = document.getElementById('msg-in');
        if(!input.value) return;
        const encrypted = CryptoJS.AES.encrypt(input.value, mKey).toString();
        channel.publish('msg', { sender: myNick, content: encrypted, avatar: activeAv, role: myRole, isImg: false });
        input.value = "";
    }

    async function sendFile(el) {
        if(isChatLocked && myRole === 'user') return alert("CHAT YOPILGAN!");
        const file = el.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const encrypted = CryptoJS.AES.encrypt(e.target.result, mKey).toString();
            channel.publish('msg', { sender: myNick, content: encrypted, avatar: activeAv, role: myRole, isImg: true });
        };
        reader.readAsDataURL(file);
    }

    function sendAction(type) {
        let state = type === 'lock' ? !isChatLocked : null;
        channel.publish('system', { type: type, state: state });
        if(type !== 'bg-0' && type !== 'bg-1' && type !== 'bg-2') toggleAdm();
    }

    function toggleAdm() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = (panel.style.display === "block") ? "none" : "block";
    }

    document.getElementById('msg-in').addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>
</body>
</html>
