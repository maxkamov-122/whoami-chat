<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOAMI SEC | C2 Hidden Node</title>
    <!-- KUTUBXONALAR -->
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        :root { 
            --neon: #00ff41; --super: #ff003c; --sub: #00d4ff; 
            --bg: radial-gradient(circle, #0f0f0f 0%, #000 100%);
        }
        * { box-sizing: border-box; cursor: crosshair; transition: 0.3s; }
        
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; height: 100vh; margin: 0; 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        body::after { 
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: repeating-linear-gradient(0deg, rgba(0,255,65,0.03) 0px, rgba(0,255,65,0.03) 1px, transparent 1px, transparent 2px); 
            pointer-events: none; z-index: 50; 
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 65, 0.2); border-radius: 12px;
            width: 95%; max-width: 500px; height: 90vh; display: flex; flex-direction: column; padding: 25px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.1); position: relative; z-index: 100;
        }

        @keyframes admin-blink { 0%, 100% { text-shadow: 0 0 20px var(--super); color: var(--super); } 50% { opacity: 0.4; } }
        @keyframes helper-blink { 0%, 100% { text-shadow: 0 0 20px var(--sub); color: var(--sub); } 50% { opacity: 0.4; } }
        
        .super-glow { animation: admin-blink 1s infinite !important; font-weight: bold; }
        .helper-glow { animation: helper-blink 1s infinite !important; font-weight: bold; }

        h2 { text-align: center; letter-spacing: 8px; text-shadow: 0 0 10px var(--neon); margin: 0 0 15px 0; }
        
        input, button { 
            background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon); 
            color: var(--neon); padding: 12px; margin: 8px 0; border-radius: 8px; outline: none; width: 100%;
        }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        #chat-container { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; scroll-behavior: smooth; padding-right: 5px; }
        .msg { margin: 12px 0; font-size: 0.85em; border-left: 1px solid var(--neon); padding-left: 10px; animation: slideIn 0.3s forwards; }
        .sys-msg { font-size: 0.7em; color: #555; text-align: center; margin: 5px 0; border: 1px dashed #222; }
        
        @keyframes slideIn { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* OGOHLANTIRISH EKRANI */
        #entry-warning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center;
        }

        #admin-panel { 
            display: none; position: absolute; top: 12%; left: 50%; transform: translateX(-50%); 
            background: #050505; border: 1px solid var(--super); padding: 20px; 
            z-index: 200; width: 300px; box-shadow: 0 0 30px var(--super); border-radius: 12px; 
        }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.65em; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- 1. KIRISH OGOHLANTIRISHI -->
<div id="entry-warning">
    <h1 style="color: var(--super); letter-spacing: 5px; font-size: 1.8em;">[ DIQQAT: MAXFIY TUGUN ]</h1>
    <p style="max-width: 500px; color: var(--neon); font-size: 0.9em; line-height: 1.5;">
        FAQAT HACKERLAR VA KIBER HAVFSIZLIK MUTAXASISLAR UCHUN. ODDIY FOYDALANUVCHILARGA TAQIQLANGAN. 
        BUNING ICHI TO'LIQ SHIFRLANGAN VA ANONIM.
    </p>
    <button style="width: 200px; margin-top: 25px;" onclick="document.getElementById('entry-warning').style.display='none'">[ KIRISH ]</button>
</div>

<div class="glass-panel" id="main-panel">
    <!-- LOGIN EKRANI -->
    <div id="login-scr" style="display: flex; flex-direction: column; justify-content: center; height: 100%;">
        <h2>[ WHOAMI SEC ]</h2>
        <div class="av-box" style="display:flex; justify-content:center; gap:15px; font-size:2em; margin-bottom:15px;">
            <span class="av-opt active" onclick="setAv('👤', this)">👤</span>
            <span class="av-opt" onclick="setAv('🤖', this)">🤖</span>
            <span class="av-opt" onclick="setAv('🕶️', this)">🕶️</span>
            <span class="av-opt" onclick="setAv('👽', this)">👽</span>
        </div>
        <input type="text" id="nick-in" placeholder="NIKNI KIRITING..." oninput="checkAdm(this.value)">
        <div id="pass-box" style="display:none;"><input type="password" id="pass-in" placeholder="MAXFIY KALIT..."></div>
        <button onclick="launch()">TIZIMNI YUKLASH</button>
    </div>

    <!-- CHAT EKRANI -->
    <div id="chat-scr" style="display:none; flex-direction: column; height: 100%;">
        <div class="status-bar">
            <span>ONLAYN: <b id="online-count">0</b></span>
            <span id="ghost-status" style="display:none; color:var(--super);">[ GHOST REJIMI ]</span>
            <button id="adm-btn" style="display:none; width:auto; padding:2px 8px; border-color: var(--super); color: var(--super);" onclick="toggleAdm()">[CMD]</button>
        </div>
        <div id="chat-container"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="msg-in" style="flex-grow:1" placeholder="Xabarni shifrlash...">
            <button onclick="send()" style="width:50px">></button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel">
        <h4 id="adm-title" class="super-glow" style="text-align:center; margin-top:0;">ROOT_CONTROL</h4>
        <button onclick="sendAction('clear')" style="border-color: var(--super)">LOGLARNI TOZALASH</button>
        <button onclick="toggleGhost()" id="ghost-btn" style="border-color: var(--sub)">👻 GHOST REJIMI: OFF</button>
        
        <div id="root-only">
            <button onclick="sendAction('force-enc')" style="background: var(--super); color:white; border:none; margin-top:10px;">🛡️ BARCHANI SHIFRLASH</button>
            <p style="font-size: 0.7em; margin: 15px 0 5px;">FON BOSHQARUVI:</p>
            <div style="display:flex; gap:5px;">
                <button onclick="sendAction('bg-0')" style="font-size: 8px;">QORA</button>
                <button onclick="sendAction('bg-1')" style="font-size: 8px;">QIZIL</button>
                <button onclick="sendAction('bg-2')" style="font-size: 8px;">KO'K</button>
            </div>
        </div>
        <button onclick="toggleAdm()" style="margin-top:10px; border-color:#555">ORQAGA</button>
    </div>
</div>

<script>
    const ABLY_KEY = '7k7eJQ.wlzQCA:mT1OA_HGf29bZrs8s_kMJ2K39lR6UgNr1aOGks7ttds';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('whoami-v8-node');

    let activeAv = "👤", myRole = "user", myNick = "", mKey = "WHOAMI_XGAB_2026_SECURE_NODE";
    let isGhost = false, ghostKey = "SECRET_GHOST_666_KEY";

    function setAv(av, el) { activeAv = av; document.querySelectorAll('.av-opt').forEach(x => x.classList.remove('active')); el.classList.add('active'); }
    function checkAdm(v) { 
        const l = v.toLowerCase();
        document.getElementById('pass-box').style.display = (l === "x-gab" || l === "helper") ? "block" : "none"; 
    }

    async function launch() {
        const n = document.getElementById('nick-in').value, p = document.getElementById('pass-in').value;
        if(!n) return;
        myNick = n;

        if(n.toLowerCase() === "x-gab" && p === "2011") { 
            myRole = "super"; activeAv = "👑"; document.getElementById('adm-btn').style.display = "block";
        } else if(n.toLowerCase() === "helper" && p === "2024") {
            myRole = "helper"; activeAv = "🛡️"; document.getElementById('adm-btn').style.display = "block";
            document.getElementById('adm-title').className = "helper-glow"; document.getElementById('adm-title').innerText = "HELPER_CONTROL";
            document.getElementById('root-only').style.display = "none";
        }
        
        document.getElementById('login-scr').style.display = "none";
        document.getElementById('chat-scr').style.display = "flex";
        
        if(myRole !== "super") channel.publish('status', { type: 'join', n: n });

        channel.subscribe('msg', (m) => {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'msg';
            div.setAttribute('data-content', m.data.content);
            
            try {
                // Ghost rejimini tekshirish
                let keyToUse = m.data.isG ? ghostKey : mKey;
                let dec = CryptoJS.AES.decrypt(m.data.content, keyToUse).toString(CryptoJS.enc.Utf8);
                
                let glow = "", tag = "";
                if(m.data.role === 'super') { glow = "class='super-glow'"; tag = "<span class='super-glow'>[ADMIN]</span> "; }
                if(m.data.role === 'helper') { glow = "class='helper-glow'"; tag = "<span class='helper-glow'>[HELPER]</span> "; }

                if(dec) {
                    div.innerHTML = `<span>${m.data.av}</span> ${tag}<b ${glow}>${m.data.sender}:</b> <span class="txt">${dec}</span>`;
                } else {
                    // Agar shifr ochilmasa (user uchun ghost xabar)
                    div.innerHTML = `<span>${m.data.av}</span> ${tag}<b ${glow}>${m.data.sender}:</b> <span class="txt" style="color:#444">[ SHIFRLANGAN MA'LUMOT ]</span>`;
                }
            } catch(e) { 
                div.innerHTML = `<span>${m.data.av}</span> <b style="color:#555">${m.data.sender}:</b> <span class="txt" style="color:#444">[ ERROR ]</span>`; 
            }
            
            container.appendChild(div); container.scrollTop = container.scrollHeight;
            setTimeout(() => { div.style.opacity="0"; setTimeout(()=>div.remove(),1000); }, 300000);
        });

        channel.subscribe('system', (m) => {
            if(m.data.type === 'clear') document.getElementById('chat-container').innerHTML = "";
            if(m.data.type === 'force-enc') {
                document.querySelectorAll('.msg .txt').forEach(t => {
                    t.innerText = "###### SHIFRLANGAN ######";
                    t.style.color = "var(--super)";
                });
            }
            if(m.data.type.startsWith('bg-')) {
                const colors = ['#000', 'radial-gradient(circle, #200000 0%, #000 100%)', 'radial-gradient(circle, #001a20 0%, #000 100%)'];
                document.body.style.background = colors[m.data.type.split('-')[1]];
            }
        });

        channel.subscribe('status', (m) => {
            if(m.data.type === 'join') {
                const d = document.createElement('div'); d.className = 'sys-msg'; d.innerText = `[+] NODE: ${m.data.n} ULANDI`;
                document.getElementById('chat-container').appendChild(d);
            }
        });

        channel.presence.subscribe('enter', updateOnline);
        channel.presence.subscribe('leave', updateOnline);
        await channel.presence.enter({ u: n });
    }

    function updateOnline() {
        channel.presence.get((err, m) => { document.getElementById('online-count').innerText = m ? m.length : 0; });
    }

    async function send() {
        const input = document.getElementById('msg-in');
        if(!input.value) return;
        
        // Ghost mode yoqilgan bo'lsa maxfiy kalit ishlatiladi
        let keyToUse = isGhost ? ghostKey : mKey;
        const encrypted = CryptoJS.AES.encrypt(input.value, keyToUse).toString();
        
        channel.publish('msg', { 
            sender: myNick, 
            content: encrypted, 
            av: activeAv, 
            role: myRole, 
            isG: isGhost 
        });
        input.value = "";
    }

    function toggleGhost() {
        isGhost = !isGhost;
        document.getElementById('ghost-btn').innerText = isGhost ? "👻 GHOST REJIMI: ON" : "👻 GHOST REJIMI: OFF";
        document.getElementById('ghost-status').style.display = isGhost ? "inline" : "none";
    }

    function sendAction(type) {
        channel.publish('system', { type: type });
        if(!type.startsWith('bg-')) toggleAdm();
    }

    function toggleAdm() {
        const p = document.getElementById('admin-panel');
        p.style.display = (p.style.display === "block") ? "none" : "block";
    }

    document.getElementById('msg-in').addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>
</body>
</html>
