<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOAMI SEC | C2 Hidden Node</title>
    <!-- KUTUBXONALAR -->
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        :root { 
            --neon: #00ff41; --super: #ff003c; --sub: #00d4ff; 
            --bg: radial-gradient(circle, #0f0f0f 0%, #000 100%);
        }
        * { box-sizing: border-box; cursor: crosshair; transition: 0.3s; }
        
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; height: 100vh; margin: 0; 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        body::after { 
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: repeating-linear-gradient(0deg, rgba(0,255,65,0.03) 0px, rgba(0,255,65,0.03) 1px, transparent 1px, transparent 2px); 
            pointer-events: none; z-index: 50; 
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 65, 0.2); border-radius: 12px;
            width: 95%; max-width: 500px; height: 90vh; display: flex; flex-direction: column; padding: 25px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.1); position: relative; z-index: 100;
        }

        /* NEON ANIMATSIYALAR */
        @keyframes admin-blink { 0%, 100% { text-shadow: 0 0 15px var(--super); color: var(--super); } 50% { opacity: 0.5; } }
        @keyframes helper-blink { 0%, 100% { text-shadow: 0 0 15px var(--sub); color: var(--sub); } 50% { opacity: 0.5; } }
        @keyframes glitch-fast { 0% { transform: translate(0); } 20% { transform: translate(-3px, 3px); } 40% { transform: translate(3px, -3px); } 100% { transform: translate(0); } }
        
        .super-glow { animation: admin-blink 1.2s infinite !important; font-weight: bold; }
        .helper-glow { animation: helper-blink 1.2s infinite !important; font-weight: bold; }
        .glitch-anim { animation: glitch-fast 0.2s infinite; border: 1px solid var(--super) !important; }

        h2 { text-align: center; letter-spacing: 8px; text-shadow: 0 0 10px var(--neon); margin: 0 0 15px 0; }
        
        input, button { 
            background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon); 
            color: var(--neon); padding: 12px; margin: 8px 0; border-radius: 8px; outline: none; width: 100%;
        }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        #chat-container { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; scroll-behavior: smooth; padding-right: 5px; }
        .msg { margin: 12px 0; font-size: 0.85em; border-left: 1px solid var(--neon); padding-left: 10px; animation: slideIn 0.3s forwards; }
        .sys-msg { font-size: 0.75em; color: #555; text-align: center; margin: 10px 0; border: 1px dashed #333; padding: 5px; }
        
        @keyframes slideIn { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        #admin-panel { 
            display: none; position: absolute; top: 12%; left: 50%; transform: translateX(-50%); 
            background: #050505; border: 1px solid var(--super); padding: 20px; 
            z-index: 200; width: 300px; box-shadow: 0 0 30px var(--super); border-radius: 12px; 
        }

        .av-box { display: flex; justify-content: center; gap: 15px; font-size: 2em; margin-bottom: 15px; }
        .av-opt { cursor: pointer; opacity: 0.4; }
        .av-opt.active { opacity: 1; transform: scale(1.3); text-shadow: 0 0 15px var(--neon); }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.65em; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 10px; }
        #panic-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #600; color: #fff; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

<div id="panic-overlay">
    <h1 style="font-size: 3em; margin:0;">⚠️ XAVF ⚠️</h1>
    <p>CHAT HAVF OSTIDA! TEZDA CHIQING!</p>
</div>

<div class="glass-panel" id="main-panel">
    <!-- LOGIN SCREEN -->
    <div id="login-scr" style="display: flex; flex-direction: column; justify-content: center; height: 100%;">
        <h2>[ WHOAMI SEC ]</h2>
        <div class="av-box">
            <span class="av-opt active" onclick="setAv('👤', this)">👤</span>
            <span class="av-opt" onclick="setAv('🤖', this)">🤖</span>
            <span class="av-opt" onclick="setAv('🕶️', this)">🕶️</span>
            <span class="av-opt" onclick="setAv('👽', this)">👽</span>
        </div>
        <input type="text" id="nick-in" placeholder="IDENTIFIKATOR (NIK)..." oninput="checkAdm(this.value)">
        <div id="pass-box" style="display:none;"><input type="password" id="pass-in" placeholder="MAXFIY KALIT..."></div>
        <button onclick="launch()">TIZIMNI YUKLASH</button>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-scr" style="display:none; flex-direction: column; height: 100%;">
        <div class="status-bar">
            <span>ONLAYN: <b id="online-count">0</b></span>
            <span id="st-mode" style="display:none; color:var(--super);">[ STEALTH ]</span>
            <button id="adm-btn" style="display:none; width:auto; padding:2px 8px; border-color: var(--super); color: var(--super);" onclick="toggleAdm()">[CMD]</button>
        </div>
        <div id="chat-container"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="msg-in" style="flex-grow:1" placeholder="Xabarni shifrlash...">
            <button onclick="send()" style="width:50px">></button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel">
        <h4 id="adm-title" class="super-glow" style="text-align:center; margin-top:0;">ROOT_CONTROL</h4>
        <button onclick="sendAction('clear')" style="border-color: var(--super)">LOGLARNI TOZALASH</button>
        <button onclick="toggleStealth()" id="st-btn" style="border-color: var(--sub)">👤 NIQOBLANISH: OFF</button>
        <button onclick="toggleGhost()" id="gh-btn" style="border-color: var(--sub)">👻 GHOST MODE: OFF</button>
        
        <div id="root-only">
            <button onclick="sendAction('panic')" style="background:var(--super); color:white; border:none; margin-top:10px;">🚨 TREVOGA</button>
            <button onclick="sendAction('force-enc')" style="border-color: var(--super)">🛡️ ISBOT: SHIFRLASH</button>
            <p style="font-size:0.6em; margin:10px 0 5px;">FON BOSHQARUVI:</p>
            <div style="display:flex; gap:5px;">
                <button onclick="sendAction('bg-0')" style="font-size:8px;">QORA</button>
                <button onclick="sendAction('bg-1')" style="font-size:8px;">QIZIL</button>
                <button onclick="sendAction('bg-2')" style="font-size:8px;">KO'K</button>
            </div>
        </div>
        <button onclick="toggleAdm()" style="margin-top:10px; border-color:#555">ORQAGA</button>
    </div>
</div>

<script>
    const ABLY_KEY = '7k7eJQ.wlzQCA:mT1OA_HGf29bZrs8s_kMJ2K39lR6UgNr1aOGks7ttds';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('whoami-v10-final');

    let activeAv = "👤", myRole = "user", myNick = "", mKey = "WHOAMI_XGAB_2026_SECURE_NODE", gKey = "GHOST_KEY_99";
    let isGhost = false, isStealth = false;

    function setAv(av, el) { activeAv = av; document.querySelectorAll('.av-opt').forEach(x => x.classList.remove('active')); el.classList.add('active'); }
    function checkAdm(v) { const l = v.toLowerCase(); document.getElementById('pass-box').style.display = (l === "x-gab" || l === "helper") ? "block" : "none"; }

    async function launch() {
        const n = document.getElementById('nick-in').value, p = document.getElementById('pass-in').value;
        if(!n) return; myNick = n;

        if(n.toLowerCase() === "x-gab" && p === "2011") { 
            myRole = "super"; activeAv = "👑"; document.getElementById('adm-btn').style.display = "block";
        } else if(n.toLowerCase() === "helper" && p === "6969") {
            myRole = "helper"; activeAv = "🛡️"; document.getElementById('adm-btn').style.display = "block";
            document.getElementById('adm-title').className = "helper-glow"; document.getElementById('adm-title').innerText = "HELPER_CONTROL";
            document.getElementById('root-only').style.display = "none";
        }
        
        document.getElementById('login-scr').style.display = "none";
        document.getElementById('chat-scr').style.display = "flex";
        
        channel.subscribe('msg', (m) => {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'msg';
            div.setAttribute('data-raw', m.data.c);
            
            let currentK = m.data.g ? gKey : mKey;
            try {
                let dec = CryptoJS.AES.decrypt(m.data.c, currentK).toString(CryptoJS.enc.Utf8);
                let glow = "", tag = "", name = m.data.s, av = m.data.a;
                
                if(m.data.r === 'super' && !m.data.st) { glow = "class='super-glow'"; tag = "[ADMIN] "; }
                if(m.data.r === 'helper' && !m.data.st) { glow = "class='helper-glow'"; tag = "[HELPER] "; }
                if(m.data.st) { name = "user69"; av = "👤"; }

                if(dec) {
                    div.innerHTML = `<span>${av}</span> <b ${glow}>${tag}${name}:</b> <span class="txt">${dec}</span>`;
                } else if(m.data.g) {
                    div.innerHTML = `<span>${av}</span> <b ${glow}>${tag}${name}:</b> <span class="txt" style="color:var(--super)">[ MAXFIY SHIFR ]</span>`;
                }
            } catch(e) { div.innerHTML = `<span>${m.data.a}</span> <b>${m.data.s}:</b> <span class="txt">[ ERROR ]</span>`; }
            
            container.appendChild(div); container.scrollTop = container.scrollHeight;
        });

        channel.subscribe('system', (m) => {
            if(m.data.t === 'clear') {
                const c = document.getElementById('chat-container');
                c.innerHTML = `<div class="sys-msg super-glow glitch-anim">[ SYSTEM ] ${m.data.by} LOGLARNI TOZALADI</div>`;
                setTimeout(() => c.innerHTML = "", 3000);
            }
            if(m.data.t === 'panic') document.getElementById('panic-overlay').style.display = "flex";
            if(m.data.t === 'force-enc') {
                document.querySelectorAll('.msg .txt').forEach(t => { t.innerText = t.parentElement.getAttribute('data-raw').substring(0,25) + "..."; t.style.color = "var(--super)"; });
            }
            if(m.data.t.startsWith('bg-')) {
                const colors = ['#000', 'radial-gradient(circle, #200000 0%, #000 100%)', 'radial-gradient(circle, #001a20 0%, #000 100%)'];
                document.body.style.background = colors[m.data.t.split('-')];
            }
        });

        channel.presence.subscribe('enter', updateOnline); channel.presence.subscribe('leave', updateOnline);
        await channel.presence.enter({ u: n });
    }

    function updateOnline() { channel.presence.get((err, m) => { document.getElementById('online-count').innerText = m ? m.length : 0; }); }

    async function send() {
        const input = document.getElementById('msg-in'); if(!input.value) return;
        let k = isGhost ? gKey : mKey;
        const enc = CryptoJS.AES.encrypt(input.value, k).toString();
        channel.publish('msg', { s: myNick, c: enc, a: activeAv, r: myRole, g: isGhost, st: isStealth });
        input.value = "";
    }

    function toggleStealth() {
        isStealth = !isStealth;
        document.getElementById('st-btn').innerText = isStealth ? "👤 NIQOBLANISH: ON" : "👤 NIQOBLANISH: OFF";
        document.getElementById('st-mode').style.display = isStealth ? "inline" : "none";
    }

    function toggleGhost() {
        isGhost = !isGhost;
        document.getElementById('gh-btn').innerText = isGhost ? "👻 GHOST MODE: ON" : "👻 GHOST MODE: OFF";
    }

    function sendAction(t) { channel.publish('system', { t: t, by: (myRole === 'super' ? 'ADMIN' : 'HELPER') }); if(!t.startsWith('bg-')) toggleAdm(); }
    function toggleAdm() { const p = document.getElementById('admin-panel'); p.style.display = (p.style.display === "block") ? "none" : "block"; }
    document.getElementById('msg-in').addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>
</body>
</html>
