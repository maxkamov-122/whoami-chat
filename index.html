<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOAMI SEC | C2 Ultimate Node</title>
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        :root { 
            --neon: #00ff41; --super: #ff003c; --sub: #00d4ff; --admin-gold: #ffea00;
            --bg-main: #000;
        }
        * { box-sizing: border-box; cursor: crosshair; transition: 0.5s; font-family: 'Courier New', monospace; }
        
        body { background: var(--bg-main); color: var(--neon); height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* NEON FON ANIMATSIYALARI */
        .bg-pulse-red { animation: pulseRed 2s infinite; }
        .bg-pulse-blue { animation: pulseBlue 2s infinite; }
        .bg-pulse-green { animation: pulseGreen 2s infinite; }

        @keyframes pulseRed { 0%, 100% { background: #000; } 50% { background: #300; box-shadow: inset 0 0 100px #f00; } }
        @keyframes pulseBlue { 0%, 100% { background: #000; } 50% { background: #003; box-shadow: inset 0 0 100px #00f; } }
        @keyframes pulseGreen { 0%, 100% { background: #000; } 50% { background: #010; box-shadow: inset 0 0 100px #0f0; } }

        .glass-panel {
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px);
            border: 1px solid var(--neon); border-radius: 10px;
            width: 98%; max-width: 700px; height: 95vh; display: flex; flex-direction: column; padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2); position: relative; z-index: 100;
        }

        /* XABAR ANIMATSIYALARI */
        @keyframes admin-entry { from { transform: scale(0.5) rotateX(90deg); opacity: 0; } to { transform: scale(1) rotateX(0); opacity: 1; } }
        @keyframes user-entry { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes gold-glow { 0%, 100% { text-shadow: 0 0 15px var(--admin-gold), 0 0 30px var(--admin-gold); color: var(--admin-gold); } 50% { opacity: 0.8; } }

        .msg-admin-special { animation: admin-entry 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid var(--admin-gold) !important; padding: 10px; background: rgba(255, 234, 0, 0.05); }
        .admin-gold-txt { animation: gold-glow 1s infinite; font-weight: bold; font-size: 1.1em; }
        .msg-user { animation: user-entry 0.4s ease-out; }

        input, button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin: 5px 0; border-radius: 5px; outline: none; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        #chat-container { flex-grow: 1; overflow-y: auto; padding: 10px; border: 1px solid #111; margin-bottom: 10px; }
        .msg { margin: 15px 0; border-left: 2px solid var(--neon); padding-left: 10px; }
        .sys-info { font-size: 0.7em; color: #666; text-align: center; margin: 5px 0; text-transform: uppercase; letter-spacing: 2px; }

        .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 2px solid var(--super); padding: 25px; z-index: 1000; width: 350px; text-align: center; }
    </style>
</head>
<body id="main-body">

<div class="glass-panel">
    <!-- LOGIN -->
    <div id="login-scr">
        <h2 style="text-align:center; color: var(--super); letter-spacing: 5px;">[ WHOAMI ENCRYPTED ]</h2>
        <p class="sys-info" style="color:var(--super)">TIZIM FAQAT MUTAXASISLAR UCHUN! ODDY FOYDALANUVCHILAR TAQIQLANGAN!</p>
        <input type="text" id="nick-in" placeholder="NIK..." oninput="checkRole(this.value)" style="width:100%">
        <div id="pass-box" style="display:none;"><input type="password" id="pass-in" placeholder="KALIT..." style="width:100%"></div>
        <button onclick="launch()" style="width:100%">TERMINALGA KIRISH</button>
    </div>

    <!-- CHAT TERMINAL -->
    <div id="chat-scr" style="display:none; flex-direction: column; height: 100%;">
        <div style="display:flex; justify-content:space-between; font-size:0.7em; border-bottom: 1px solid #222; padding-bottom: 5px;">
            <span>STATUS: <b id="online-count">1</b> ONLINE</span>
            <button id="adm-btn" style="display:none; padding:2px 10px; font-size:9px; border-color:var(--super)" onclick="togglePanel('admin-panel')">ADMIN PANEL</button>
            <button id="hlp-btn" style="display:none; padding:2px 10px; font-size:9px; border-color:var(--sub)" onclick="togglePanel('helper-panel')">HELPER PANEL</button>
        </div>
        
        <div id="chat-container"></div>
        
        <div style="display:flex; gap:10px;">
            <input type="text" id="msg-in" placeholder="Xabarni yozing (Enter - yuborish)..." style="flex-grow:1">
            <button onclick="send()" style="width:80px">SEND</button>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div id="admin-panel" class="modal">
        <h3 class="admin-gold-txt">ADMIN COMMANDS</h3>
        <button onclick="sendAction('clear')" style="width:100%">LOGLARNI TOZALASH</button>
        <button onclick="toggleStealth()" style="width:100%">NIQOBLANISH (USER69)</button>
        <button onclick="sendAction('havf')" style="width:100%; background: var(--super); color:white;">🚨 HAVF (SHIFRLASH)</button>
        <p style="font-size:0.6em; margin:10px 0;">NEON FONLAR:</p>
        <div style="display:flex; gap:5px;">
            <button onclick="changeTheme('red')" style="flex:1; font-size:8px;">QIZIL</button>
            <button onclick="changeTheme('blue')" style="flex:1; font-size:8px;">KO'K</button>
            <button onclick="changeTheme('green')" style="flex:1; font-size:8px;">YASHIL</button>
        </div>
        <button onclick="togglePanel('admin-panel')" style="margin-top:15px; border-color:#444">YOPISH</button>
    </div>

    <!-- HELPER MODAL -->
    <div id="helper-panel" class="modal" style="border-color: var(--sub);">
        <h3 style="color:var(--sub)">HELPER TOOLS</h3>
        <button onclick="sendAction('clear')" style="width:100%">CHATNI TOZALASH</button>
        <div style="display:flex; gap:5px;">
            <button onclick="changeTheme('red')" style="flex:1; font-size:8px;">QIZIL</button>
            <button onclick="changeTheme('blue')" style="flex:1; font-size:8px;">KO'K</button>
            <button onclick="changeTheme('green')" style="flex:1; font-size:8px;">YASHIL</button>
        </div>
        <button onclick="togglePanel('helper-panel')" style="margin-top:15px; border-color:#444">YOPISH</button>
    </div>
</div>

<script>
    const ABLY_KEY = '7k7eJQ.wlzQCA:mT1OA_HGf29bZrs8s_kMJ2K39lR6UgNr1aOGks7ttds';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('whoami-v13-ultimate');

    let myNick = "", myRole = "user", isStealth = false, havfMode = false;
    const cKey = "AES_KEY_3301";

    function checkRole(v) { document.getElementById('pass-box').style.display = (v.toLowerCase()==="x-gab" || v.toLowerCase()==="helper") ? "block" : "none"; }

    function launch() {
        myNick = document.getElementById('nick-in').value.trim();
        const p = document.getElementById('pass-in').value;
        if(!myNick) return;

        if(myNick.toLowerCase()==="x-gab" && p==="6969") { myRole="admin"; document.getElementById('adm-btn').style.display='block'; }
        else if(myNick.toLowerCase()==="helper" && p==="6996") { myRole="helper"; document.getElementById('hlp-btn').style.display='block'; }

        document.getElementById('login-scr').style.display = 'none';
        document.getElementById('chat-scr').style.display = 'flex';

        // Faqat admin bo'lmasa kirish xabari
        if(myRole !== 'admin') {
            channel.publish('sys', { type: 'join', user: myNick });
        }

        channel.subscribe('msg', (m) => renderMsg(m.data));
        channel.subscribe('sys', (m) => handleSys(m.data));
    }

    function send() {
        const inp = document.getElementById('msg-in');
        if(!inp.value) return;

        let dNick = isStealth ? "user69" : myNick;
        let dRole = isStealth ? "user" : myRole;
        let dAv = (dRole==="admin") ? "👑" : (dRole==="helper" ? "🛡️" : "👤");

        const enc = CryptoJS.AES.encrypt(inp.value, cKey).toString();
        channel.publish('msg', { nick: dNick, text: enc, av: dAv, role: dRole, raw: inp.value });
        inp.value = '';
    }

    // ENTER TUGMASI
    document.getElementById('msg-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });

    function renderMsg(data) {
        const box = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = (data.role === 'admin') ? 'msg msg-admin-special' : 'msg msg-user';
        
        let content = havfMode ? data.text : CryptoJS.AES.decrypt(data.text, cKey).toString(CryptoJS.enc.Utf8);
        let nStyle = (data.role === 'admin') ? 'admin-gold-txt' : (data.role === 'helper' ? 'helper-txt' : '');
        let rTag = (data.role === 'admin') ? ' [ADMIN]' : (data.role === 'helper' ? ' [HELPER]' : '');

        div.innerHTML = `<span class="${nStyle}">${data.av}${rTag} ${data.nick}:</span> <span style="color:${data.role==='admin'?'var(--admin-gold)':'#fff'}">${content}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function handleSys(data) {
        const box = document.getElementById('chat-container');
        if(data.type === 'join') {
            box.innerHTML += `<div class="sys-info">>> ${data.user} TARMOQQA ULANDI</div>`;
        } else if(data.type === 'clear') {
            box.innerHTML = '<div class="sys-info" style="color:var(--neon)">CHAT TOZALANDI</div>';
        } else if(data.type === 'theme') {
            document.getElementById('main-body').className = 'bg-pulse-' + data.color;
            box.innerHTML += `<div class="sys-info" style="color:#fff; border:1px solid #fff; padding:5px;">FON ${data.color.toUpperCase()} RANGA O'ZGARTIRILDI</div>`;
        } else if(data.type === 'havf') {
            havfMode = true;
            box.innerHTML += `<div class="sys-info" style="color:var(--super); border:2px solid var(--super); padding:10px;">🚨 CHAT HAVF OSTIDA! HAMMA YOZISHMALAR SHIFRLANDI!</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    function togglePanel(id) {
        const p = document.getElementById(id);
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function toggleStealth() {
        isStealth = !isStealth;
        alert(isStealth ? "Niqoblanish faol: user69" : "Niqoblanish o'chirildi");
    }

    function sendAction(t) { channel.publish('sys', { type: t }); }
    function changeTheme(c) { channel.publish('sys', { type: 'theme', color: c }); }
</script>
</body>
</html>
