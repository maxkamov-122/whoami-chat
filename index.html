<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOAMI SEC | C2 Hidden Node</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        :root { --neon: #00ff41; --super: #ff003c; --sub: #00d4ff; --bg-color: radial-gradient(circle, #0f0f0f 0%, #000 100%); }
        * { box-sizing: border-box; cursor: crosshair; transition: 0.3s; }
        body { background: var(--bg-color); color: var(--neon); font-family: 'Courier New', monospace; height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        body::before { content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .glass-panel { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 65, 0.2); border-radius: 12px; width: 95%; max-width: 500px; height: 90vh; display: flex; flex-direction: column; padding: 25px; box-shadow: 0 0 40px rgba(0, 255, 65, 0.1); position: relative; z-index: 20; }
        @keyframes admin-blink { 0%, 100% { text-shadow: 0 0 20px var(--super); color: var(--super); } 50% { opacity: 0.4; } }
        .super-glow { animation: admin-blink 1s infinite !important; font-weight: bold; }
        h2 { text-align: center; letter-spacing: 8px; text-shadow: 0 0 10px var(--neon); margin: 0 0 20px 0; }
        input, button { background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin: 8px 0; border-radius: 8px; outline: none; width: 100%; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); cursor: pointer; }
        #chat-container { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; scroll-behavior: smooth; }
        .msg { margin: 12px 0; font-size: 0.85em; border-left: 1px solid var(--neon); padding-left: 10px; }
        .info-bar { display: flex; justify-content: space-between; font-size: 0.65em; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        #admin-panel { display: none; position: absolute; top: 15%; left: 50%; transform: translateX(-50%); background: #050505; border: 1px solid var(--super); padding: 20px; border-radius: 12px; z-index: 100; width: 300px; box-shadow: 0 0 30px var(--super); }
    </style>
</head>
<body>
<div class="glass-panel">
    <div id="login-scr">
        <h2>[ WHOAMI SEC ]</h2>
        <div style="display:flex; justify-content:center; gap:15px; font-size:2em; margin-bottom:20px;">
            <span class="av-opt" onclick="setAv('👤', this)" style="cursor:pointer">👤</span>
            <span class="av-opt" onclick="setAv('🤖', this)" style="cursor:pointer">🤖</span>
            <span class="av-opt" onclick="setAv('🕶️', this)" style="cursor:pointer">🕶️</span>
        </div>
        <input type="text" id="nick-in" placeholder="NIK KIRITING..." oninput="checkAdminFlow(this.value)">
        <div id="pass-box" style="display:none;"><input type="password" id="pass-in" placeholder="MAXFIY KALIT..."></div>
        <button onclick="launchSystem()">TIZIMNI YUKLASH</button>
    </div>

    <div id="chat-scr" style="display:none; flex-direction: column; height: 100%;">
        <div class="info-bar">
            <span>🟢 HOLAT: E2EE_ACTIVE</span>
            <span>👥 NODELAR: <b id="user-count">...</b></span>
            <button id="adm-btn" style="display:none; width:auto; padding:2px 8px;" onclick="toggleAdminPanel()">[CMD]</button>
        </div>
        <div id="chat-container"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="msg-in" style="flex-grow:1" placeholder="Xabar yozing...">
            <button onclick="send()">></button>
        </div>
    </div>

    <div id="admin-panel">
        <h4 class="super-glow" style="text-align:center">ROOT ACCESS</h4>
        <button onclick="clearLogs()" style="width:100%">Chatni Tozalash</button>
        <button onclick="toggleAdminPanel()" style="width:100%; margin-top:10px;">YOPISH</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let activeAv = "👤";
    let myRole = "user";
    const masterKey = "XGAB_INTERNAL_2026";

    function setAv(av, el) {
        activeAv = av;
        document.querySelectorAll('.av-opt').forEach(a => a.style.textShadow = "none");
        el.style.textShadow = "0 0 20px var(--neon)";
    }

    function checkAdminFlow(v) {
        document.getElementById('pass-box').style.display = (v.toLowerCase() === "x-gab") ? "block" : "none";
    }

    function launchSystem() {
        const n = document.getElementById('nick-in').value;
        const p = document.getElementById('pass-in').value;
        if(!n) return;
        if(n.toLowerCase() === "x-gab" && p !== "2011") { alert("Xato!"); return; }
        
        if(n.toLowerCase() === "x-gab") { myRole = "super"; activeAv = "👑"; document.getElementById('adm-btn').style.display = "block"; }
        
        document.getElementById('login-scr').style.display = "none";
        document.getElementById('chat-scr').style.display = "flex";

        // Tizimga kirish haqida Botga ma'lumot yuboramiz
        tg.sendData(JSON.stringify({ type: "login", user: n, av: activeAv }));
    }

    function send() {
        const i = document.getElementById('msg-in'), n = document.getElementById('nick-in').value;
        if(i.value.trim() !== "") {
            const encrypted = CryptoJS.AES.encrypt(i.value, masterKey).toString();
            // Botga shifrlangan xabarni yuboramiz
            tg.sendData(JSON.stringify({ type: "msg", u: n, t: encrypted, a: activeAv }));
            
            // O'zimizga ham darhol chiqaramiz
            printMsg(n, i.value, activeAv);
            i.value = "";
        }
    }

    function printMsg(u, t, av) {
        const c = document.getElementById('chat-container');
        const d = document.createElement('div');
        d.className = 'msg';
        let cls = (u.toLowerCase() === 'x-gab') ? "super-glow" : "";
        d.innerHTML = `<span>${av}</span> <div><b class="${cls}">${u}:</b><br><span>${t}</span></div>`;
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }

    // ENG MUHIM JOYI: Boshqalar yozgan xabarni Telegram Bot xabar sifatida yuboradi.
    // Bizning Web App o'sha xabarlarni ko'rsatish uchun Telegram interfeysidan foydalanadi.
    
    function toggleAdminPanel() { document.getElementById('admin-panel').style.display = (document.getElementById('admin-panel').style.display === "block") ? "none" : "block"; }
    function clearLogs() { document.getElementById('chat-container').innerHTML = ""; toggleAdminPanel(); }
    document.getElementById('msg-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
</script>
</body>
</html>
